        // Base path to drinks images folder (relative from pages/)
        const DRINKS_IMG_BASE = '../images/drinks/';

        function buildBar() {
            const container = document.getElementById('barMenuContainer');
            if (!container) return;
            container.innerHTML = '';

            BAR_DATA.forEach((cat, ci) => {
                const catDiv = document.createElement('div');
                catDiv.className = 'bar-category';
                catDiv.setAttribute('data-aos', 'fade-up');
                catDiv.setAttribute('data-aos-delay', String(ci * 30));

                // Centered header
                const header = document.createElement('div');
                header.className = 'bar-category-header';
                const catKey = 'bar.category.' + cat.category.toLowerCase().replace(/[^a-z0-9]/g, '');
                const translatedCategory = (window.MoshkoLang) ? window.MoshkoLang.t(catKey) : cat.category;
                header.innerHTML = `<span class="bar-cat-icon">${cat.icon}</span><h3 class="bar-cat-name" data-i18n="${catKey}">${translatedCategory}</h3>`;
                catDiv.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'bar-drinks-grid';
                catDiv.appendChild(grid);

                cat.drinks.forEach(([name, alc, imgFile]) => {
                    const folderSrc = imgFile ? DRINKS_IMG_BASE + encodeURIComponent(imgFile) : null;
                    const hasPhoto = !!folderSrc;

                    const card = document.createElement('div');
                    card.className = 'drink-card glass-card';

                    // Photo area
                    const area = document.createElement('div');
                    area.className = 'drink-photo-area';

                    if (hasPhoto) {
                        const img = document.createElement('img');
                        img.src = folderSrc;
                        img.alt = name;
                        img.classList.add('has-photo');
                        // Hide if failed to load
                        img.onerror = () => {
                            img.style.display = 'none';
                        };
                        area.appendChild(img);
                    }

                    // Info
                    const info = document.createElement('div');
                    info.className = 'drink-info';
                    info.innerHTML = `<div class="drink-name">${name}</div><div class="drink-alc">${alc}</div>`;

                    card.appendChild(area);
                    card.appendChild(info);
                    grid.appendChild(card);
                });

                container.appendChild(catDiv);
            });

            if (window.AOS) AOS.refreshHard();
        }

        document.addEventListener('DOMContentLoaded', buildBar);
        window.addEventListener('page-load', buildBar);
        window.addEventListener('lang-change', buildBar);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Moshko's Core - Parlamentum Timeline - Roles and Service Years!">
    <title>Timeline - Moshko's Core</title>
    <link rel="stylesheet" href="../../design/style.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="space-background">
        <!-- populated by shared.js -->
    </div>

    <!-- Global Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <!-- App Logic -->
    <script src="../../ragdoll/ragdoll_physics.js"></script>
    <script src="../../ragdoll/ragdoll_background.js"></script>
    <script src="../../ragdoll/tnt.js"></script>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <!-- populated by shared.js -->
    </nav>

    <div id="content-root">
        <main id="main-content" dir="ltr" lang="en">


            <!-- Header -->
            <section class="page-header">
                <div class="container">
                    <h1 class="page-title" data-aos="zoom-in" data-i18n="timeline.title">My Timeline</h1>
                    <p class="page-subtitle" data-aos="fade-up" data-aos-delay="100" data-i18n="timeline.subtitle">My Path Through the Parlamentum Staff!</p>
                    <div style="margin-top: 2rem; display: flex; justify-content: center;">
                        <a href="../minecraft.html" class="btn btn-primary" data-i18n="timeline.back">Back to Minecraft Page</a>
                    </div>
                </div>
            </section>

            <!-- Stats -->
            <div class="timeline-stats" data-aos="fade-up" data-aos-delay="200">
                <div class="stat-card">
                    <span class="stat-number" id="stat-roles">12</span>
                    <span class="stat-label" data-i18n="timeline.stat.roles">Role Count</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="stat-years">3+</span>
                    <span class="stat-label" data-i18n="timeline.stat.tenure">Service Tenure</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="stat-since">2022</span>
                    <span class="stat-label" data-i18n="timeline.stat.since">Commissioned In</span>
                </div>
            </div>

            <!-- Timeline -->
            <section class="timeline-section">
                <div id="timeline-root">
                    <!-- Populated by JS below -->
                </div>
            </section>

        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <!-- populated by shared.js -->
    </footer>

    <div id="ragdoll-container"></div>
    <div class="skin-control-panel">
        <input type="text" id="skin-username" placeholder="Minecraft Username" data-i18n="skin.placeholder" value="">
        <button onclick="window.changeSkin(document.getElementById('skin-username').value)" data-i18n="skin.btn.change">Change Skin</button>
        <button onclick="window.resetRagdoll()" style="background: #e74c3c;" data-i18n="skin.btn.reset">Reset</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../../data/info_data.js"></script>
    <script src="../../core/lang.js"></script>
    <script src="../../core/shared.js"></script>
    <script src="../../core/script.js"></script>
    <script src="../../data/parlamentum_data.js"></script>

    <script>
        // Timeline data is loaded from parlamentum_data.js
        // Edit that file to add or remove entries - no need to touch this page.

        /* -- Helpers ------------------------------------------- */
        function parseDate(str) {
            const [d, m, y] = str.split('/').map(Number);
            return new Date(y, m - 1, d);
        }

        function formatDate(str) {
            const [d, m, y] = str.split('/');
            // Use translated month names if MoshkoLang is available
            const months = (window.MoshkoLang)
                ? window.MoshkoLang.monthNames()
                : ['January','February','March','April','May','June','July','August','September','October','November','December'];
            return `${months[parseInt(m) - 1]} ${parseInt(d)}`;
        }

        /* -- Build Timeline ------------------------------------ */
        function buildTimeline() {
            // Sort entries chronologically (newest first)
            const sorted = [...PARLAMENTUM_TIMELINE].sort((a, b) => parseDate(b.date) - parseDate(a.date));

            // Update stats
            const years = new Set(sorted.map(e => e.date.split('/')[2]));

            document.getElementById('stat-roles').textContent = PARLAMENTUM_STATS.rolesCount || sorted.length;
            document.getElementById('stat-years').textContent = PARLAMENTUM_STATS.yearsActive || (years.size + '+');
            document.getElementById('stat-since').textContent = PARLAMENTUM_STATS.yearJoined || Math.min(...[...years].map(Number));

            const root = document.getElementById('timeline-root');
            root.innerHTML = '';

            let currentYear = null;
            let currentContainer = null;

            sorted.forEach((entry, idx) => {
                const year = entry.date.split('/')[2];

                // Year divider
                if (year !== currentYear) {
                    currentYear = year;

                    currentContainer = document.createElement('div');
                    currentContainer.className = 'timeline-container';
                    root.appendChild(currentContainer);

                    const divider = document.createElement('div');
                    divider.className = 'timeline-year-divider';
                    divider.setAttribute('data-aos', 'fade-up');
                    divider.innerHTML = `<span class="year-badge">${year}</span>`;
                    root.appendChild(divider);
                }

                const isRight = idx % 2 === 1;

                const item = document.createElement('div');
                item.className = `timeline-item ${entry.role}${isRight ? ' right' : ''}`;
                item.setAttribute('data-aos', isRight ? 'fade-left' : 'fade-right');
                item.setAttribute('data-aos-delay', '50');

                item.innerHTML = `
                <div class="timeline-card">
                    <span class="card-icon">${entry.icon}</span>
                    <div class="card-title">${entry.title}</div>
                    <div class="card-date">${formatDate(entry.date)}</div>
                </div>
            `;

                currentContainer.appendChild(item);
            });
        }

        /* -- Initialize ---------------------------------------- */
        function initParlamentum() {
            if (!document.getElementById('timeline-root')) return;
            buildTimeline();
            // AOS is initialized once globally by shared.js; just refresh after DOM changes
            if (window.AOS) {
                AOS.refreshHard();
            }
        }

        // Run immediately - script is at bottom of body so DOM is already ready.
        initParlamentum();

        // Also listen for page-load for SPA navigation (subsequent visits)
        window.addEventListener('page-load', initParlamentum);

        // Re-render dates when language changes
        window.addEventListener('lang-change', buildTimeline);
    </script>
    <script src="../../core/sounds.js?v=20"></script>
</body>

</html>
